name: Publish

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write    # Zwingend erforderlich für OIDC und Provenance!
      contents: write    # Erlaubt GitHub Actions den sauberen Umgang mit Tags/Releases

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (needed for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish @luzconsulting/n8n-nodes-salessuite
        run: npm publish --provenance --access public
        env:
          RELEASE_MODE: 'true'
